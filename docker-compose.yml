version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: bitebuddy-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data

  postgres:
    image: postgres:16-alpine
    container_name: bitebuddy-postgres
    environment:
      POSTGRES_DB: bitebuddy
      POSTGRES_USER: bitebuddy
      POSTGRES_PASSWORD: bitebuddy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - local-db

  redis:
    image: redis:7-alpine
    container_name: bitebuddy-redis
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis_data:/data
    profiles:
      - local-db

  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: bitebuddy-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    profiles:
      - local-db

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
